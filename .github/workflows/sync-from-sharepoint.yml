name: Sync desde SharePoint

on:
  schedule:
    # Cada 10 minutos en minutos despejados (:02,:12,:22,:32,:42,:52).
    # GitHub retrasa o se salta los crons programados en :00 y :30 (los minutos
    # más congestionados de la plataforma); usar minutos desplazados y mayor
    # frecuencia reduce muchísimo los ciclos perdidos.
    - cron: '2,12,22,32,42,52 * * * *'
  workflow_dispatch:  # Botón "Run workflow" en GitHub para forzar sync manual

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xlsx node-fetch@2

      - name: Download Excel from SharePoint and convert to JSON
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: node scripts/sync.js

      - name: Download EEFF from SharePoint and build finanzas.json
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: node scripts/sync-finanzas.js

      - name: Commit JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tareas.json
          git add finanzas.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Sin cambios — no se hace commit."
          else
            git commit -m "auto: sync desde SharePoint $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "JSON actualizado y publicado."
          fi
